version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: graphql-tower-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Registry=Data Source=/data/registry.db
      - Cors__AllowedOrigins__0=http://localhost:5001
    volumes:
      - tower_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - tower

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: graphql-tower-web
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - GatewayApi__BaseUrl=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tower

volumes:
  tower_data:

networks:
  tower:
    driver: bridge
