# Global image pull settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# --- API (Gateway) ---
api:
  image:
    repository: your-registry/graphql-tower-api
    tag: "latest"
    pullPolicy: IfNotPresent

  # NOTE: SQLite does not support multiple writers.
  # Use replicaCount: 1 with SQLite, or switch persistence.engine to "postgres"
  # and set replicaCount > 1.
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # SQLite data persistence
  persistence:
    enabled: true
    # engine: sqlite | postgres
    engine: sqlite
    size: 1Gi
    storageClass: ""     # Leave empty to use cluster default
    accessMode: ReadWriteOnce
    mountPath: /data

  env:
    - name: ASPNETCORE_ENVIRONMENT
      value: Production
    - name: HealthMonitor__IntervalSeconds
      value: "30"

  # Optional: override CORS allowed origins
  cors:
    allowedOrigins: []

  # Pod annotations (e.g. for Prometheus scraping)
  podAnnotations: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# --- Web (Blazor Admin UI) ---
web:
  image:
    repository: your-registry/graphql-tower-web
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  env:
    - name: ASPNETCORE_ENVIRONMENT
      value: Production

  podAnnotations: {}

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: graphql-tower.example.com
      paths:
        - path: /graphql
          pathType: Prefix
          service: api
        - path: /api
          pathType: Prefix
          service: api
        - path: /healthz
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
  # tls:
  #   - secretName: graphql-tower-tls
  #     hosts:
  #       - graphql-tower.example.com

# --- Initial upstream services seeded via ConfigMap ---
# These are loaded on first boot if the registry DB is empty.
initialServices: []
