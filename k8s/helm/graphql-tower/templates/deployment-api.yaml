apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "graphql-tower.fullname" . }}-api
  labels:
    {{- include "graphql-tower.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "graphql-tower.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "graphql-tower.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.api.persistence.enabled }}
            - name: ConnectionStrings__Registry
              value: "Data Source={{ .Values.api.persistence.mountPath }}/registry.db"
            {{- end }}
            {{- if .Values.api.cors.allowedOrigins }}
            {{- range $i, $origin := .Values.api.cors.allowedOrigins }}
            - name: "Cors__AllowedOrigins__{{ $i }}"
              value: {{ $origin | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "graphql-tower.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- if .Values.api.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.api.persistence.mountPath }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
      {{- if .Values.api.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "graphql-tower.fullname" . }}-api-data
      {{- end }}
