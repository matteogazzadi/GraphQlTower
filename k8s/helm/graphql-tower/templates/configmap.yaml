apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "graphql-tower.fullname" . }}-config
  labels:
    {{- include "graphql-tower.labels" . | nindent 4 }}
data:
  {{- if .Values.initialServices }}
  # Consumed by DatabaseSeeder via TOWER_INITIAL_SERVICES env var on first boot.
  # Each entry: { "Name": "slug", "DisplayName": "Label", "Url": "http://...", "Enabled": true }
  TOWER_INITIAL_SERVICES: {{ .Values.initialServices | toJson | quote }}
  {{- end }}
